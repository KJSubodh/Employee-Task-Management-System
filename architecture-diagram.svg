<svg width="900" height="760" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Employee Task Management System — Architecture Diagram</title>
  <desc>Layered architecture: React/Redux client, Express API with JWT middleware, service/repository/DAO backend layers, MySQL database, and supporting file storage and email/cron services.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="760" fill="#ffffff"/>

  <text x="450" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#0a0a0a">Employee Task Management System — Architecture</text>

  <!-- CLIENT LAYER -->
  <rect x="60" y="60" width="780" height="90" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="80" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#3730a3">CLIENT — React (Vite)</text>

  <g>
    <rect x="80" y="94" width="150" height="42" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="0.75"/>
    <text x="155" y="119" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#312e81">Redux Toolkit</text>
  </g>
  <g>
    <rect x="245" y="94" width="150" height="42" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="0.75"/>
    <text x="320" y="119" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#312e81">React Router</text>
  </g>
  <g>
    <rect x="410" y="94" width="150" height="42" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="0.75"/>
    <text x="485" y="119" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#312e81">Components</text>
  </g>
  <g>
    <rect x="575" y="94" width="245" height="42" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="0.75"/>
    <text x="697" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#312e81">Axios (api.js)</text>
    <text x="697" y="128" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#4338ca">JWT attached via interceptor</text>
  </g>

  <line x1="450" y1="150" x2="450" y2="182" stroke="#475569" stroke-width="1.25" marker-end="url(#arrow)"/>
  <text x="466" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">HTTPS / REST (JSON, multipart)</text>

  <!-- API LAYER -->
  <rect x="60" y="188" width="780" height="80" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="80" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#065f46">API LAYER — Express (Node.js)</text>

  <g>
    <rect x="80" y="222" width="170" height="36" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="0.75"/>
    <text x="165" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Routes</text>
  </g>
  <g>
    <rect x="265" y="222" width="200" height="36" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="0.75"/>
    <text x="365" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#064e3b">protect / adminOnly (JWT)</text>
  </g>
  <g>
    <rect x="480" y="222" width="170" height="36" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="0.75"/>
    <text x="565" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#064e3b">express-validator</text>
  </g>
  <g>
    <rect x="665" y="222" width="155" height="36" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="0.75"/>
    <text x="742" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#064e3b">multer (uploads)</text>
  </g>

  <line x1="450" y1="268" x2="450" y2="300" stroke="#475569" stroke-width="1.25" marker-end="url(#arrow)"/>

  <!-- CONTROLLER LAYER -->
  <rect x="60" y="306" width="780" height="52" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="80" y="337" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#9a3412">CONTROLLERS — auth · employee · task · report</text>
  <text x="700" y="337" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#c2410c">HTTP req/res, error → status code mapping</text>

  <line x1="450" y1="358" x2="450" y2="390" stroke="#475569" stroke-width="1.25" marker-end="url(#arrow)"/>

  <!-- SERVICE LAYER -->
  <rect x="60" y="396" width="780" height="52" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="80" y="427" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#991b1b">SERVICES — business rules</text>
  <text x="770" y="427" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#b91c1c">password policy · due-date rule · completed-task lock · role gating</text>

  <line x1="450" y1="448" x2="450" y2="480" stroke="#475569" stroke-width="1.25" marker-end="url(#arrow)"/>

  <!-- REPOSITORY LAYER -->
  <rect x="60" y="486" width="780" height="52" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="517" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">REPOSITORIES — authorization + query composition</text>

  <line x1="450" y1="538" x2="450" y2="570" stroke="#475569" stroke-width="1.25" marker-end="url(#arrow)"/>

  <!-- DAO LAYER -->
  <rect x="60" y="576" width="780" height="52" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="80" y="607" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">DAOs — Sequelize queries (Op filters, joins, aggregates)</text>

  <line x1="450" y1="628" x2="450" y2="660" stroke="#475569" stroke-width="1.25" marker-end="url(#arrow)"/>

  <!-- DATABASE -->
  <rect x="300" y="666" width="300" height="56" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.25"/>
  <text x="450" y="690" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#14532d">MySQL</text>
  <text x="450" y="708" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#166534">Users · Tasks · Notifications</text>

  <!-- Side services: File storage -->
  <rect x="30" y="486" width="0" height="0"/>
  <g>
    <rect x="620" y="666" width="130" height="56" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="1"/>
    <text x="685" y="688" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" fill="#6b21a8">/uploads</text>
    <text x="685" y="706" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" fill="#7e22ce">PDF/JPG/PNG, 5MB</text>
  </g>
  <line x1="620" y1="694" x2="606" y2="694" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <g>
    <rect x="150" y="666" width="130" height="56" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
    <text x="215" y="688" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" fill="#92400e">node-cron</text>
    <text x="215" y="706" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" fill="#b45309">due/overdue checks</text>
  </g>
  <line x1="280" y1="694" x2="298" y2="694" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="60" y="748" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#64748b">Flow: Client → Express routes/middleware → Controllers → Services (business rules) → Repositories (authorization) → DAOs → MySQL</text>
</svg>